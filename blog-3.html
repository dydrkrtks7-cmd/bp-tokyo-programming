    <style>
        :root {
            --color-bg: #0a0a0a;
            --color-surface: #111111;
            --color-surface-elevated: #1a1a1a;
            --color-gold: #c8a45c;
            --color-gold-dim: #8b7340;
            --color-gold-bright: #e0c47a;
            --color-text-primary: #e8e4dd;
            --color-text-secondary: #a8a49d;
            --color-text-tertiary: #6b6760;
            --color-border: #222222;
            --color-border-light: #2a2a2a;
            --font-serif: 'Noto Serif KR', 'Nanum Myeongjo', 'Apple SD Gothic Neo', serif;
            --font-sans: 'Pretendard', 'Inter', 'Apple SD Gothic Neo', -apple-system, BlinkMacSystemFont, sans-serif;
            --shadow-card: 0 1px 3px rgba(0,0,0,0.4), 0 0 0 1px rgba(200,164,92,0.06);
            --shadow-elevated: 0 4px 16px rgba(0,0,0,0.5), 0 0 0 1px rgba(200,164,92,0.1);
            --radius-sm: 6px;
            --radius-md: 10px;
            --radius-lg: 16px;
            --transition-fast: 180ms ease;
            --transition-smooth: 320ms cubic-bezier(0.4, 0, 0.2, 1);
            --container-max: 1120px;
            --container-narrow: 780px;
        }

        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html {
            font-size: 16px;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            text-rendering: optimizeLegibility;
            scroll-behavior: smooth;
            background-color: var(--color-bg);
            color: var(--color-text-primary);
        }

        body {
            font-family: var(--font-sans);
            line-height: 1.7;
            letter-spacing: -0.01em;
            background: var(--color-bg);
            min-height: 100vh;
            overflow-x: hidden;
        }

        .hero-gradient {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            pointer-events: none;
            z-index: 0;
            background: radial-gradient(ellipse 75% 60% at 50% 0%, rgba(200,164,92,0.04) 0%, transparent 60%),
                        radial-gradient(ellipse 40% 35% at 30% 20%, rgba(200,164,92,0.02) 0%, transparent 55%);
        }

        .content-gradient-light {
            position: fixed;
            top: 60%;
            left: 50%;
            transform: translate(-50%, 0);
            width: 80%;
            height: 50vh;
            pointer-events: none;
            z-index: 0;
            background: radial-gradient(ellipse at center, rgba(200,164,92,0.015) 0%, transparent 70%);
        }

        h1, h2, h3, h4 {
            font-family: var(--font-serif);
            font-weight: 600;
            letter-spacing: -0.02em;
            color: var(--color-text-primary);
            line-height: 1.3;
        }

        h1 {
            font-size: clamp(2rem, 4.5vw, 3rem);
            margin-bottom: 1rem;
            background: linear-gradient(135deg, var(--color-gold-bright) 0%, var(--color-gold) 40%, var(--color-gold-dim) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        h2 {
            font-size: clamp(1.4rem, 3vw, 1.85rem);
            margin-bottom: 0.85rem;
            color: var(--color-gold);
        }

        h3 {
            font-size: clamp(1.1rem, 2.2vw, 1.35rem);
            margin-bottom: 0.65rem;
        }

        p {
            color: var(--color-text-secondary);
            margin-bottom: 1rem;
            font-size: 0.975rem;
        }

        a {
            color: var(--color-gold);
            text-decoration: none;
            transition: color var(--transition-fast);
            border-bottom: 1px solid transparent;
        }

        a:hover {
            color: var(--color-gold-bright);
            border-bottom-color: var(--color-gold-dim);
        }

        .drop-cap::first-letter {
            float: left;
            font-family: var(--font-serif);
            font-size: 3.2em;
            line-height: 0.8;
            margin-right: 0.14em;
            margin-top: 0.05em;
            color: var(--color-gold);
            font-weight: 600;
        }

        .site-container {
            position: relative;
            z-index: 1;
            max-width: var(--container-max);
            margin: 0 auto;
            padding: 0 1.5rem;
        }

        header.site-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 1.2rem 0;
            border-bottom: 1px solid var(--color-border);
            margin-bottom: 2.5rem;
            position: relative;
            z-index: 10;
        }

        .site-logo {
            font-family: var(--font-serif);
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--color-gold);
            letter-spacing: -0.01em;
            border-bottom: none;
        }

        .site-logo:hover {
            color: var(--color-gold-bright);
            border-bottom: none;
        }

        nav.nav-present {
            display: flex;
            align-items: center;
            gap: 1.8rem;
        }

        nav.nav-present a {
            font-size: 0.875rem;
            font-weight: 500;
            color: var(--color-text-secondary);
            border-bottom: 1px solid transparent;
            transition: color var(--transition-fast), border-color var(--transition-fast);
            padding-bottom: 2px;
        }

        nav.nav-present a:hover,
        nav.nav-present a.active {
            color: var(--color-gold);
            border-bottom-color: var(--color-gold);
        }

        nav.nav-present a.active {
            font-weight: 600;
        }

        .hamburger-menu {
            display: none;
            flex-direction: column;
            gap: 5px;
            cursor: pointer;
            background: none;
            border: none;
            padding: 6px;
            z-index: 20;
        }

        .hamburger-menu span {
            display: block;
            width: 24px;
            height: 2px;
            background: var(--color-gold);
            border-radius: 2px;
            transition: transform var(--transition-smooth), opacity var(--transition-fast);
        }

        .page-hero {
            text-align: center;
            padding: 2.5rem 0 1.5rem;
            position: relative;
        }

        .page-hero .subtitle {
            font-size: 1rem;
            color: var(--color-text-tertiary);
            max-width: 600px;
            margin: 0 auto;
            font-style: italic;
        }

        .trend-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 1.5rem;
            margin: 2.5rem 0;
        }

        .trend-card {
            background: var(--color-surface);
            border: 1px solid var(--color-border);
            border-radius: var(--radius-md);
            padding: 1.6rem;
            transition: box-shadow var(--transition-smooth), border-color var(--transition-smooth);
            position: relative;
            overflow: hidden;
        }

        .trend-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 3px;
            background: linear-gradient(90deg, transparent, var(--color-gold-dim), transparent);
            opacity: 0;
            transition: opacity var(--transition-smooth);
        }

        .trend-card:hover {
            box-shadow: var(--shadow-elevated);
            border-color: var(--color-border-light);
        }

        .trend-card:hover::before {
            opacity: 1;
        }

        .trend-card .trend-badge {
            display: inline-block;
            font-size: 0.72rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--color-gold);
            background: rgba(200,164,92,0.08);
            padding: 0.25rem 0.7rem;
            border-radius: 20px;
            margin-bottom: 0.9rem;
        }

        .trend-card .trend-badge.hot {
            background: rgba(200,100,80,0.12);
            color: #e09080;
        }

        .trend-card h3 {
            font-size: 1.15rem;
            margin-bottom: 0.5rem;
            color: var(--color-text-primary);
        }

        .trend-card p {
            font-size: 0.875rem;
            color: var(--color-text-secondary);
            margin-bottom: 0.8rem;
            line-height: 1.6;
        }

        .trend-card .trend-meta {
            display: flex;
            align-items: center;
            gap: 0.8rem;
            font-size: 0.75rem;
            color: var(--color-text-tertiary);
        }

        .trend-card .trend-meta span {
            display: flex;
            align-items: center;
            gap: 0.25rem;
        }

        .newsletter-signal {
            background: var(--color-surface-elevated);
            border: 1px solid var(--color-border-light);
            border-radius: var(--radius-lg);
            padding: 2rem;
            margin: 2.5rem 0;
            text-align: center;
        }

        .newsletter-signal h3 {
            color: var(--color-gold);
            margin-bottom: 0.5rem;
        }

        .newsletter-signal p {
            max-width: 500px;
            margin: 0 auto 1.2rem;
            font-size: 0.9rem;
        }

        .inline-link-group {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 1rem;
            margin-top: 0.5rem;
        }

        .inline-link-group a {
            font-size: 0.85rem;
            font-weight: 500;
            padding: 0.4rem 1rem;
            border: 1px solid var(--color-border-light);
            border-radius: 20px;
            transition: all var(--transition-fast);
            background: var(--color-surface);
            border-bottom: none;
        }

        .inline-link-group a:hover {
            background: var(--color-surface-elevated);
            border-color: var(--color-gold-dim);
            color: var(--color-gold-bright);
            border-bottom: none;
        }

        .faq-section {
            margin: 3rem 0 2rem;
            padding: 2rem 0;
            border-top: 1px solid var(--color-border);
        }

        .faq-section h2 {
            text-align: center;
            margin-bottom: 2rem;
        }

        .faq-item {
            background: var(--color-surface);
            border: 1px solid var(--color-border);
            border-radius: var(--radius-sm);
            padding: 1.3rem 1.5rem;
            margin-bottom: 0.8rem;
            transition: border-color var(--transition-fast);
        }

        .faq-item:hover {
            border-color: var(--color-border-light);
        }

        .faq-item h4 {
            font-size: 1rem;
            color: var(--color-gold);
            margin-bottom: 0.4rem;
            font-family: var(--font-sans);
            font-weight: 600;
        }

        .faq-item p {
            font-size: 0.875rem;
            margin-bottom: 0;
        }

        footer.site-footer {
            text-align: center;
            padding: 2.5rem 0 2rem;
            border-top: 1px solid var(--color-border);
            margin-top: 2.5rem;
        }

        footer.site-footer p {
            font-size: 0.75rem;
            color: var(--color-text-tertiary);
            margin-bottom: 0.3rem;
        }

        footer.site-footer a {
            font-size: 0.75rem;
        }

        .tel-link {
            color: var(--color-gold);
            font-weight: 500;
            border-bottom: 1px dotted var(--color-gold-dim);
        }

        .tel-link:hover {
            color: var(--color-gold-bright);
            border-bottom-color: var(--color-gold);
        }
